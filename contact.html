      <div class="contact-us">
        <h3>Submit Your Info here!!</h3>
        <form action="submit" method="post" id="contact-form">
          <label class="standard-label" for="contact-email">Email:</label>
          <input type="Email" required="required" id="contact-email">

          <label class="standard-label" for="contact-tel">tel:</label>
          <input type="tel" id="contact-tel" pattern="\d{3}[\-]\d{3}[\-]\d{4}">

          <label class="standard-label" for="contact-message">message:</label>
          <textarea id="contact-message" maxlength="240" required> </textarea>
          <input type="submit" value="submit message">
        </form>
      </div>
